version: "3.9"

services:
  bot:
    build: .
    container_name: wenbot-fusion
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    command: python -m bot.main

  db:
    image: postgres:16-alpine
    container_name: wenbot-fusion-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: polybot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polybot_change_me}
      POSTGRES_DB: polybot
    # No host port exposed — only accessible from other containers
    # Change to "5433:5432" if you need external access
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polybot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wenbot-fusion-redis
    restart: unless-stopped
    # No host port exposed — only accessible from other containers
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
