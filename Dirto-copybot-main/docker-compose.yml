version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  telegram-bot:
    build: ./bot
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./shared:/app/shared
      - ./wallet:/app/wallet

  execution-engine:
    build: ./engine
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./shared:/app/shared
      - ./wallet:/app/wallet

  strategy-example:
    build: ./strategies/example_strategy
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./shared:/app/shared
